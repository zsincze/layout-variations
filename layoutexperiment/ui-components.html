<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Components — Layout Experiment</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%23666' width='32' height='32' rx='4'/><path fill='%23fff' d='M8 8h6v6H8zm10 0h6v6h-6zm-10 10h6v6H8zm10 0h6v6h-6z'/></svg>" type="image/svg+xml" />
  <link rel="stylesheet" href="../styles/main.css" />
  <style>
    .ui-components-page { max-width: 720px; margin: 0 auto; padding: var(--space-l); }
    .ui-components-back { margin-bottom: var(--space-l); }
    .ui-components-back a { color: var(--color-link); text-decoration: none; }
    .ui-components-back a:hover { text-decoration: underline; }
    .ui-components-title { margin: 0 0 var(--space-s); font-size: 1.5rem; }
    .ui-components-intro { margin: 0 0 var(--space-xl); color: var(--color-muted); font-size: 0.9375rem; }
    .ui-components-section { margin-bottom: var(--space-xl); }
    .ui-components-section h2 { font-size: 1.125rem; margin: 0 0 var(--space-m); color: var(--color-fg); font-weight: 600; }
    .ui-components-section .section-block { margin-bottom: var(--space-l); }
    .ui-components-section .section-block:last-child { margin-bottom: 0; }
    /* Reuse compositions styles for showcase */
    .compositions-item { display: flex; align-items: center; justify-content: space-between; gap: var(--space-m); padding: var(--space-s) var(--space-m); margin-bottom: var(--space-xs); background: var(--color-surface-elevated); border: 1px solid var(--color-border); border-radius: var(--radius); }
    .compositions-item-name { flex: 1; min-width: 0; font-weight: 500; }
    .compositions-item-meta { font-size: 0.8125rem; color: var(--color-muted); margin-top: 2px; }
    .compositions-item-actions { display: flex; gap: var(--space-s); flex-shrink: 0; }
    .compositions-empty { padding: var(--space-xl); text-align: center; color: var(--color-muted); background: var(--color-surface-elevated); border: 1px dashed var(--color-border); border-radius: var(--radius); }
    .compositions-error { padding: var(--space-m); background: #3a2020; color: #f88; border-radius: var(--radius); margin-bottom: var(--space-m); }
  </style>
</head>
<body class="dark-ui">
  <div class="ui-components-page">
    <nav class="ui-components-back" aria-label="Breadcrumb">
      <a href="compositions.html">← Back to compositions</a>
    </nav>
    <h1 class="ui-components-title">UI Components</h1>
    <p class="ui-components-intro">All UI components used in the layout variations experience (editor, play, compositions). Same classes and structure as in the app. Rendered from <code>ui-elements.js</code>.</p>

    <div id="ui-components-sections"></div>
  </div>

  <script src="icon-component.js"></script>
  <script src="ui-elements.js"></script>
  <script>
    (function () {
      var container = document.getElementById('ui-components-sections');
      if (!container || typeof window.UI_ELEMENTS === 'undefined') return;

      window.UI_ELEMENTS.forEach(function (section) {
        var sectionEl = document.createElement('section');
        sectionEl.className = 'ui-components-section';
        sectionEl.id = section.sectionId;
        sectionEl.setAttribute('aria-labelledby', section.headingId);
        sectionEl.innerHTML =
          '<h2 id="' + section.headingId + '">' + escapeHtml(section.title) + '</h2>' +
          section.html;
        container.appendChild(sectionEl);
      });

      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      // Dropdown behavior for intent and artboard
      var intentTrigger = document.querySelector('#section-intent [aria-controls="intent-demo-listbox"]');
      var intentListbox = document.getElementById('intent-demo-listbox');
      if (intentTrigger && intentListbox) {
        intentTrigger.addEventListener('click', function () {
          var open = intentListbox.getAttribute('hidden') == null;
          intentListbox.toggleAttribute('hidden', open);
          intentTrigger.setAttribute('aria-expanded', !open);
        });
      }
      var artboardTrigger = document.querySelector('#section-artboard [aria-controls="artboard-demo-listbox"]');
      var artboardListbox = document.getElementById('artboard-demo-listbox');
      if (artboardTrigger && artboardListbox) {
        artboardTrigger.addEventListener('click', function () {
          var open = artboardListbox.getAttribute('hidden') == null;
          artboardListbox.toggleAttribute('hidden', open);
          artboardTrigger.setAttribute('aria-expanded', !open);
        });
      }
    })();
  </script>
</body>
</html>
